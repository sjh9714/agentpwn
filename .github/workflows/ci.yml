name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      # Enforces the core guarantee: every level is winnable by its intended
      # solution and resists a naive direct exfil. No level ships unwinnable.
      - run: npm test
